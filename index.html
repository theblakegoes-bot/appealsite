<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steal Time From Others Appeals</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    --red: #e8222a; --dark-red: #b01a20; --bg: #111318; --panel: #1c1f28; --card: #242836;
    --border: #2e3347; --text: #eef0f8; --muted: #7a7f99; --green: #2ecc71; --yellow: #f1c40f;
    --blue: #3498db; --purple: #9b59b6; --teal: #1abc9c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); min-height: 100vh; }
  .admin-banner { display: none; background: rgba(155,89,182,0.15); border-bottom: 1px solid var(--purple); text-align: center; padding: 5px; font-size: 0.72rem; font-weight: 700; color: var(--purple); letter-spacing: 3px; text-transform: uppercase; }
  .admin-banner.show { display: block; }
  nav { background: var(--panel); border-bottom: 3px solid var(--red); padding: 14px 30px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--red); letter-spacing: 1px; }
  .logo span { color: var(--text); }
  .nav-tabs { display: flex; gap: 8px; }
  .tab-btn { background: none; border: 2px solid var(--border); color: var(--muted); padding: 7px 20px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active, .tab-btn:hover { border-color: var(--red); color: var(--text); background: rgba(232,34,42,0.12); }
  .page { display: none; max-width: 720px; margin: 40px auto; padding: 0 20px; }
  .page.active { display: block; }
  .hero { text-align: center; margin-bottom: 36px; }
  .hero-icon { font-size: 3rem; margin-bottom: 12px; }
  .hero h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: var(--text); }
  .hero p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  input, textarea, select { width: 100%; background: var(--panel); border: 2px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input:focus, textarea:focus, select:focus { border-color: var(--red); }
  textarea { min-height: 120px; resize: vertical; }
  .submit-btn { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .submit-btn:hover { background: var(--dark-red); }
  .submit-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; }
  .send-code-btn { width: 100%; background: var(--purple); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; margin-top: 4px; }
  .verify-btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; margin-top: 4px; }
  .success-box { background: rgba(46,204,113,0.1); border: 2px solid var(--green); border-radius: 12px; padding: 20px; text-align: center; display: none; margin-top: 20px; }
  .success-box.show { display: block; }
  .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 400px; margin: 0 auto; }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; text-align: center; display: none; }
  .login-info { color: var(--blue); font-size: 0.82rem; margin-top: 12px; text-align: center; display: none; background: rgba(52,152,219,0.08); border: 1px solid var(--blue); border-radius: 8px; padding: 10px 14px; }
  #code-step { display: none; }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
  .badge { background: var(--red); color: #fff; border-radius: 20px; padding: 3px 12px; font-size: 0.8rem; font-weight: 700; }
  .logout-btn { background: none; border: 2px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
  .whitelist-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .whitelist-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .whitelist-tag { background: rgba(155,89,182,0.15); border: 1px solid var(--purple); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: #c39bd3; display: flex; align-items: center; gap: 6px; }
  .owner-tag { background: rgba(232,34,42,0.12); border-color: var(--red); color: #f0a0a3; }
  .appeal-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .status-pill { padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
  .status-pending { background: rgba(241,196,15,0.15); color: var(--yellow); border: 1px solid var(--yellow); }
  .status-accepted { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid var(--green); }
  .status-declined { background: rgba(232,34,42,0.15); color: var(--red); border: 1px solid var(--red); }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .action-btn { padding: 7px 16px; border-radius: 8px; border: 2px solid; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; background: none; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; opacity: 0; transition: all 0.3s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(-10px); }
</style>
</head>
<body>
<div class="admin-banner" id="admin-banner">🔐 &nbsp; Admin Panel</div>
<nav>
  <div class="logo">⚔️ <span>STFO</span> Appeals</div>
  <div class="nav-tabs">
    <button class="tab-btn active" id="tab-appeal" onclick="showPage('appeal')">Submit Appeal</button>
    <button class="tab-btn" id="tab-admin" onclick="showPage('admin')">Admin Panel</button>
  </div>
</nav>

<div class="page active" id="page-appeal">
  <div class="hero"><h1>Submit an Appeal</h1><p>Explain your case clearly for review.</p></div>
  <div class="form-card">
    <div class="form-group"><label>Roblox Username</label><input type="text" id="username" /></div>
    <div class="form-group"><label>Your Email</label><input type="email" id="player-email" /></div>
    <div class="form-group"><label>Appeal Details</label><textarea id="appeal-text"></textarea></div>
    <div class="form-group"><label>Type</label><select id="punishment-type"><option value="Ban">Ban</option><option value="Mute">Mute</option></select></div>
    <button class="submit-btn" id="appeal-submit-btn" onclick="submitAppeal()">🚀 SUBMIT APPEAL</button>
    <div class="success-box" id="success-box"><h3>✅ Submitted!</h3><p>We will review your appeal soon.</p></div>
  </div>
</div>

<div class="page" id="page-admin">
  <div id="admin-login">
    <div class="login-card">
      <h2>🔐 Admin Login</h2>
      <div id="email-step">
        <div class="form-group"><label>Whitelisted Email</label><input type="email" id="admin-email" /></div>
        <button class="send-code-btn" id="send-code-btn" onclick="sendCode()">📨 SEND CODE</button>
        <div class="login-error" id="login-error">🚫 Not whitelisted.</div>
        <div class="login-info" id="login-info">📧 Code sent to Faddycutty@gmail.com</div>
      </div>
      <div id="code-step">
        <div class="form-group"><label>6-Digit Code</label><input type="text" id="admin-code" maxlength="6" style="text-align:center; font-size:1.5rem;" /></div>
        <button class="verify-btn" onclick="verifyCode()">✅ VERIFY</button>
      </div>
    </div>
  </div>
  <div id="admin-panel" style="display:none">
    <div class="admin-header"><h2>📬 Appeals <span class="badge" id="appeal-count">0</span></h2><button class="logout-btn" onclick="adminLogout()">Logout</button></div>
    <div class="whitelist-card">
      <h3>🛡️ Whitelist</h3>
      <div class="whitelist-row"><input type="email" id="whitelist-input" /><button class="action-btn" onclick="addWhitelist()">Add</button></div>
      <div class="whitelist-list" id="whitelist-list"></div>
    </div>
    <div class="appeals-list" id="appeals-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  // CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBSc1wAwQRlH8AdDhkiMnByIXZq29rTo_Q",
    authDomain: "stfo-appeals.firebaseapp.com",
    projectId: "stfo-appeals",
    storageBucket: "stfo-appeals.firebasestorage.app",
    messagingSenderId: "199350287573",
    appId: "1:199350287573:web:f3b31e415bcd407299f65c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const appealsCol = db.collection('appeals');

  const EMAILJS_SERVICE_ID = 'service_gmt5cvx';
  const EMAILJS_TEMPLATE_ID = 'template_kreqxod';
  const EMAILJS_PUBLIC_KEY = 'us7G33aq7_9z5zwcv';
  
  // STAFF EMAIL FOR CODES & NOTIFICATIONS
  const STAFF_NOTIFY_EMAIL = 'Faddycutty@gmail.com'; 
  const OWNER_EMAIL = 'Faddycutty@gmail.com'; 

  let whitelist = JSON.parse(localStorage.getItem('roblox_whitelist') || '[]');
  let pendingCode = null;
  let pendingLoginEmail = null;

  if (!whitelist.map(e => e.toLowerCase()).includes(OWNER_EMAIL.toLowerCase())) {
    whitelist.unshift(OWNER_EMAIL);
    localStorage.setItem('roblox_whitelist', JSON.stringify(whitelist));
  }

  window.addEventListener('load', () => {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    checkAdminSession();
  });

  function checkAdminSession() {
    const s = JSON.parse(localStorage.getItem('admin_session') || 'null');
    if (s && Date.now() < s.expires) openAdminPanel();
  }

  function sendCode() {
    const emailInput = document.getElementById('admin-email').value.trim().toLowerCase();
    if (!whitelist.map(e => e.toLowerCase()).includes(emailInput)) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    
    pendingCode = Math.floor(100000 + Math.random() * 900000).toString();
    pendingLoginEmail = emailInput;
    document.getElementById('send-code-btn').disabled = true;

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      email: STAFF_NOTIFY_EMAIL, // SENT TO FADDYCUTTY
      name: 'STFO Admin',
      title: '🔐 Login Code',
      message: `Login attempt for: ${emailInput}\n\nYour 6-digit code is: ${pendingCode}`,
    }).then(() => {
      document.getElementById('email-step').style.display = 'none';
      document.getElementById('code-step').style.display = 'block';
      document.getElementById('login-info').style.display = 'block';
    }).catch(() => alert('Email failed.'));
  }

  function verifyCode() {
    if (document.getElementById('admin-code').value.trim() === pendingCode) {
      localStorage.setItem('admin_session', JSON.stringify({ email: pendingLoginEmail, expires: Date.now() + 2592000000 }));
      openAdminPanel();
    } else { alert('Wrong code!'); }
  }

  function openAdminPanel() {
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    renderWhitelist();
    appealsCol.orderBy('timestamp', 'desc').onSnapshot(snap => {
      const appeals = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderAppeals(appeals);
    });
  }

  function renderAppeals(appeals) {
    const list = document.getElementById('appeals-list');
    document.getElementById('appeal-count').textContent = appeals.length;
    list.innerHTML = appeals.map(a => `
      <div class="appeal-item">
        <div style="display:flex; justify-content:space-between;">
          <b>🎮 ${esc(a.username)}</b>
          <span class="status-pill status-${(a.status||'pending').toLowerCase()}">${a.status || 'Pending'}</span>
        </div>
        <p style="margin:10px 0; color:#ccc;">${esc(a.text)}</p>
        <div class="action-row">
          <button class="action-btn" style="border-color:var(--green); color:var(--green);" onclick="setStatus('${a.id}','Accepted','${esc(a.username)}','${esc(a.email)}')">Accept</button>
          <button class="action-btn" style="border-color:var(--red); color:var(--red);" onclick="setStatus('${a.id}','Declined','${esc(a.username)}','${esc(a.email)}')">Decline</button>
          <button class="action-btn" onclick="deleteAppeal('${a.id}')">Delete</button>
        </div>
      </div>`).join('');
  }

  async function submitAppeal() {
    const data = {
      username: document.getElementById('username').value,
      email: document.getElementById('player-email').value,
      text: document.getElementById('appeal-text').value,
      type: document.getElementById('punishment-type').value,
      status: 'Pending',
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (!data.username || !data.email) return;
    await appealsCol.add(data);
    document.getElementById('success-box').classList.add('show');
    // Notify Faddycutty of new appeal
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      email: STAFF_NOTIFY_EMAIL,
      name: 'System',
      title: '📬 New Appeal',
      message: `User ${data.username} has submitted a new appeal.`
    });
  }

  async function setStatus(id, status, user, email) {
    await appealsCol.doc(id).update({ status });
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      email, name: user, title: 'Appeal Update', message: `Your appeal has been ${status}.`
    });
  }

  async function deleteAppeal(id) { if(confirm('Delete?')) await appealsCol.doc(id).delete(); }
  function showPage(p) { document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); }
  function adminLogout() { localStorage.removeItem('admin_session'); location.reload(); }
  function renderWhitelist() { document.getElementById('whitelist-list').innerHTML = whitelist.map(e => `<div class="whitelist-tag">${e}</div>`).join(''); }
  function addWhitelist() { const e = document.getElementById('whitelist-input').value.toLowerCase(); if(e && !whitelist.includes(e)){ whitelist.push(e); localStorage.setItem('roblox_whitelist', JSON.stringify(whitelist)); renderWhitelist(); } }
  function esc(s) { return s ? s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])) : ''; }
</script>
</body>
</html>
